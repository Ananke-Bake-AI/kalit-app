appId: ai.kalit.studio
productName: Kalit Studio
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
protocols:
  - name: Kalit
    schemes:
      - kalit
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
    - deb
